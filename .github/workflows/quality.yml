name: Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-launch-quality:
    name: Public launch quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'http://127.0.0.1:54321' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'local-placeholder-anon-key' }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Browser smoke
        run: npm run test:e2e:smoke

      - name: Build
        run: npm run build

  launch-readiness:
    name: Launch-readiness evidence gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    env:
      AUTH_REQUIRE_EMAIL_CODE: "true"
      RATE_LIMIT_BACKEND: "supabase"
      RUN_LAUNCH_READINESS_GATES: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://pramania.com' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      QA_DEMO_EMAIL: ${{ secrets.QA_DEMO_EMAIL }}
      QA_DEMO_PASSWORD: ${{ secrets.QA_DEMO_PASSWORD }}
      QA_DEMO_USER_A_EMAIL: ${{ secrets.QA_DEMO_USER_A_EMAIL }}
      QA_DEMO_USER_A_PASSWORD: ${{ secrets.QA_DEMO_USER_A_PASSWORD }}
      QA_DEMO_USER_B_EMAIL: ${{ secrets.QA_DEMO_USER_B_EMAIL }}
      QA_DEMO_USER_B_PASSWORD: ${{ secrets.QA_DEMO_USER_B_PASSWORD }}
      QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
      QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
      REVENUECAT_WEBHOOK_SECRET: ${{ secrets.REVENUECAT_WEBHOOK_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Launch-readiness e2e evidence
        run: npm run test:e2e:launch-readiness
